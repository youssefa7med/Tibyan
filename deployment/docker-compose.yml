version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
    container_name: ppe-backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend/app/storage:/app/storage
      - ../models:/app/models
    environment:
      - APP_NAME=PPE Safety Monitoring System
      - DEMO_MODE=${DEMO_MODE:-true}
      - TELEGRAM_ENABLED=${TELEGRAM_ENABLED:-false}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    env_file:
      - ../backend/.env
    restart: unless-stopped
    networks:
      - ppe-network

  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    container_name: ppe-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ppe-network

networks:
  ppe-network:
    driver: bridge





